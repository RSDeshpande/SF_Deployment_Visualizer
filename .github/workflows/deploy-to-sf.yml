name: Deploy to Salesforce

on:
  push:
    branches: [main]
  pull_request:
    types: [closed]
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # fixes the Node.js warning

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1 - Checkout code (upgraded to v4)
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2 - Setup Node.js 24 explicitly (fixes deprecation warning)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Step 3 - Install SF CLI properly and verify
      - name: Install Salesforce CLI
        run: |
          npm install -g @salesforce/cli@latest
          sf --version    # this will confirm sf is available

      # Step 4 - Write JWT key from GitHub Secret to file
      - name: Write JWT key
        run: |
          echo "${{ secrets.SF_JWT_KEY }}" > server.key
          chmod 600 server.key

      # Step 5 - Authenticate to Salesforce using JWT
      - name: Authenticate to Salesforce
        run: |
          sf org login jwt \
            --client-id "${{ secrets.SF_CLIENT_ID }}" \
            --jwt-key-file server.key \
            --username "${{ secrets.SF_USERNAME }}" \
            --instance-url "${{ secrets.SF_ORG_URL }}" \
            --alias myorg

      # Step 6 - Verify connection
      - name: Verify org connection
        run: sf org display --target-org myorg

      # Step 7 - Deploy metadata (only if force-app folder exists)
      - name: Deploy to Salesforce org
        run: |
          if [ -d "force-app" ]; then
            sf project deploy start \
              --source-dir force-app \
              --target-org myorg \
              --json | tee deploy_result.json
          else
            echo "No force-app directory found — skipping deploy"
          fi

      # Step 8 - Cleanup key file for security
      - name: Cleanup
        if: always()
        run: rm -f server.key