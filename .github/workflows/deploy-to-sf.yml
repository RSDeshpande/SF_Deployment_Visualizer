name: Deploy to Salesforce
on:
  push:
    branches:
      - main  # This starts the "recipe" when you push to main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Get the code from your GitHub repo
      - name: 'Checkout source code'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Install the Salesforce tool
      - name: 'Install Salesforce CLI'
        run: npm install -g @salesforce/cli

      # 3. Log into Salesforce using the Secret you added earlier
      - name: 'Authenticate to Salesforce'
        run: |
          echo "${{ secrets.SFDX_AUTH_URL }}" > sfdx_auth.txt
          sf org login auth sfdx-url-file -f sfdx_auth.txt -a devOrg -d

      # 4. Push the code to your Org
      - name: 'Deploy to Salesforce'
        run: |
          sf project deploy start --target-org devOrg --description "Automated Deploy from GitHub"