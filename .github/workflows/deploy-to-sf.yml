name: Deploy to Salesforce

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Salesforce CLI
        run: |
          npm install -g @salesforce/cli@latest
          sf --version

      - name: Validate secrets
        run: |
          echo "Checking secrets..."
          [ -z "${{ secrets.SF_CLIENT_ID }}" ] && echo "❌ SF_CLIENT_ID missing" || echo "✅ SF_CLIENT_ID set"
          [ -z "${{ secrets.SF_USERNAME }}" ] && echo "❌ SF_USERNAME missing" || echo "✅ SF_USERNAME set"
          [ -z "${{ secrets.SF_JWT_KEY }}" ]  && echo "❌ SF_JWT_KEY missing"  || echo "✅ SF_JWT_KEY set"
          [ -z "${{ secrets.SF_ORG_URL }}" ]  && echo "❌ SF_ORG_URL missing"  || echo "✅ SF_ORG_URL set"

      - name: Write JWT key
        run: |
          echo "${{ secrets.SF_JWT_KEY }}" > server.key
          chmod 600 server.key
          head -1 server.key

      - name: Authenticate to Salesforce
        run: |
          sf org login jwt \
            --client-id "${{ secrets.SF_CLIENT_ID }}" \
            --jwt-key-file server.key \
            --username "${{ secrets.SF_USERNAME }}" \
            --instance-url "https://login.salesforce.com" \
            --alias myorg \
            --set-default

      - name: Verify org connection
        run: sf org display --target-org myorg

      - name: Deploy to Salesforce
        id: deploy
        run: |
          set +e  # Don't exit on error
          sf project deploy start \
            --source-dir force-app \
            --target-org myorg \
            --json > deploy_result.json 2>&1
          DEPLOY_EXIT_CODE=$?
          echo "DEPLOY_EXIT_CODE=$DEPLOY_EXIT_CODE" >> $GITHUB_ENV
          set -e

      - name: Get Salesforce access token
        id: sf_auth
        run: |
          SF_DISPLAY=$(sf org display --target-org myorg --json)
          echo "SF_ACCESS_TOKEN=$(echo $SF_DISPLAY | jq -r '.result.accessToken')" >> $GITHUB_ENV
          echo "SF_INSTANCE_URL=$(echo $SF_DISPLAY | jq -r '.result.instanceUrl')" >> $GITHUB_ENV

      - name: Send deployment webhook to Salesforce
        if: always()
        env:
          SF_ACCESS_TOKEN: ${{ env.SF_ACCESS_TOKEN }}
          SF_INSTANCE_URL: ${{ env.SF_INSTANCE_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          BEFORE_SHA: ${{ github.event.before }}
          REPO_URL: https://github.com/${{ github.repository }}
          DEPLOY_RESULT_PATH: ./deploy_result.json
        run: node scripts/send-deployment-webhook.js

      - name: Cleanup
        if: always()
        run: rm -f server.key

      - name: Fail if deployment failed
        if: always()
        run: |
          if [ "${{ env.DEPLOY_EXIT_CODE }}" != "0" ]; then
            echo "❌ Salesforce deployment failed"
            exit 1
          fi
