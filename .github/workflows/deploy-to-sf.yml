name: Deploy to Salesforce

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Salesforce CLI
        run: |
          npm install -g @salesforce/cli@latest
          sf --version

      - name: Validate secrets
        run: |
          echo "Checking secrets..."
          [ -z "${{ secrets.SF_CLIENT_ID }}" ] && echo "❌ SF_CLIENT_ID missing" || echo "✅ SF_CLIENT_ID set"
          [ -z "${{ secrets.SF_USERNAME }}" ] && echo "❌ SF_USERNAME missing" || echo "✅ SF_USERNAME set"
          [ -z "${{ secrets.SF_JWT_KEY }}" ]  && echo "❌ SF_JWT_KEY missing"  || echo "✅ SF_JWT_KEY set"
          [ -z "${{ secrets.SF_ORG_URL }}" ]  && echo "❌ SF_ORG_URL missing"  || echo "✅ SF_ORG_URL set"

      - name: Write JWT key
        run: |
          echo "${{ secrets.SF_JWT_KEY }}" > server.key
          chmod 600 server.key
          head -1 server.key

      - name: Authenticate to Salesforce
        run: |
          sf org login jwt \
            --client-id "${{ secrets.SF_CLIENT_ID }}" \
            --jwt-key-file server.key \
            --username "${{ secrets.SF_USERNAME }}" \
            --instance-url "https://login.salesforce.com" \
            --alias myorg \
            --set-default

      - name: Verify org connection
        run: sf org display --target-org myorg

      - name: Deploy to Salesforce
        run: |
          if [ -d "force-app" ]; then
            sf project deploy start \
              --source-dir force-app \
              --target-org myorg \
              --json | tee deploy_result.json
          else
            echo "⚠️ No force-app folder found — skipping deploy"
          fi

      - name: Cleanup
        if: always()
        run: rm -f server.key