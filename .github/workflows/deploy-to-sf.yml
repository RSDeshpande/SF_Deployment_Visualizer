name: Deploy to Salesforce
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout source code'
        uses: actions/checkout@v4

      # Use Node.js 24 to avoid the deprecation warning in your screenshot
      - name: 'Setup Node.js'
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 'Install Salesforce CLI'
        run: npm install -g @salesforce/cli

      - name: 'Authenticate to Salesforce'
        run: |
          echo "${{ secrets.SFDX_AUTH_URL }}" > sfdx_auth.txt
          # Using 'npx sf' ensures the runner finds the locally installed CLI
          npx sf org login auth sfdx-url-file -f sfdx_auth.txt -a devOrg -d

      - name: 'Deploy to Salesforce'
        run: |
          npx sf project deploy start --target-org devOrg --description "Automated Deploy from GitHub"